name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      # `npm run build` runs `tsc && vite build`, which gives us both
      # typechecking and a production bundle smoke test in one step.
      - name: Build
        run: npm run build

      - name: Bundle size
        run: ls -lh dist/assets/*.js dist/assets/*.css 2>/dev/null || true
